<!DOCTYPE html>
<html>
<head>
    <title>GHMWS-GIS (beta version)</title>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="https://unpkg.com/leaflet/dist/leaflet.css" rel="stylesheet"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; }
        .controls {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            background: white;
            z-index: 1000;
            box-sizing: border-box;
        }
        .title {
            font-weight: 400;
            color: #333;
        }
        #timestamp {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }
        .buttons {
            display: flex;
            gap: 8px;
        }
        .buttons button {
            width: 36px;
            height: 36px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: #fff;
            cursor: pointer;
            font-size: 16px;
        }
        .buttons button:hover {
            background: #f5f5f5;
        }
        #mapid {
            position: absolute;
            top: 50px;
            left: 0;
            bottom: 0;
            right: 0;
        }

        .radar-legend {
            position: absolute;
            bottom: 30px;
            right: 20px; 
            background: #f4f7f8;
            padding: 10px 15px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            z-index: 1000;
            width: 320px;
            font-family: sans-serif;
            pointer-events: none;
        }
        .radar-legend-header {
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            font-size: 14px;
            color: #4a4a4a;
            margin-bottom: 8px;
        }
        .radar-legend-bar {
            height: 12px;
            border-radius: 2px;
            background: linear-gradient(to right,
                #928871 0%,   #ded097 14.28%, 
                #88ddee 14.28%, #004768 42.85%, 
                #ffee00 42.85%, #ff8100 57.14%, 
                #ff4400 57.14%, #5d0000 71.42%, 
                #ffaaff 71.42%, #ff4eff 85.71%, 
                #ffffff 85.71%, #ffffff 98.5%,  
                #00ff00 98.5%,  #00ff00 100%    
            );
            border: 1px solid rgba(0,0,0,0.08);
        }
        .radar-legend-ticks {
            display: flex;
            justify-content: space-between;
            margin-top: 6px;
            font-weight: 700;
            font-size: 13px;
            color: #555;
        }
    </style>
</head>
<body>

<div class="controls">
    <span class="title">GHMWS-GIS (beta version)</span>
    <span id="timestamp">Loading...</span>
    <div class="buttons">
        <button onclick="stop(); showFrame(animationPosition - 1);">‹</button>
        <button id="playBtn" onclick="playStop();">▶</button>
        <button onclick="stop(); showFrame(animationPosition + 1);">›</button>
    </div>
</div>

<div id="mapid"></div>

<div class="radar-legend">
    <div class="radar-legend-header">
        <span>雷達圖例</span>
        <span>dBZ</span>
    </div>
    <div class="radar-legend-bar"></div>
    <div class="radar-legend-ticks">
        <span>5</span><span>15</span><span>25</span><span>35</span><span>45</span><span>55</span><span>65</span><span>75</span>
    </div>
</div>

<script>
var TILE_SIZE = 1024;
var RADAR_OPACITY = 0.8;
var ANIMATION_DELAY_MS = 500;
var API_URL = "https://api.rainviewer.com/public/weather-maps.json";

var apiData = {};
var mapFrames = [];
var animationPosition = 0;
var animationTimer = false;
var currentLayer = null;
var isLoading = false;
var layerCache = {};

var map = L.map('mapid', {fullscreenControl: true, smoothWheelZoom: true,smoothSensitivity: 2,zoomSnap: 0, maxZoom: 16 }).setView([22.4, 114], 5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://openstreetmap.org">OpenStreetMap</a> contributors'
}).addTo(map);

const returnControl = L.Control.extend({
    options: { position: 'topleft' },
    onAdd: function() {
        const btn = L.DomUtil.create('button', 'leaflet-bar return-btn');
        btn.innerHTML = '🏠 Reset View'; // Or "Return to Frame"
        btn.style.padding = '5px';
        btn.style.cursor = 'pointer';
        btn.style.backgroundColor = 'white';
        
        btn.onclick = function() {
            // Reset to original zoom and center
            map.setView([22.3, 114.1], 10); 
            // If the map is in fullscreen, exit it
            if (document.fullscreenElement) {
                document.exitFullscreen();
            }
        };
        return btn;
    }
});

map.addControl(new returnControl());

map.on('click', async function(e) {
    const { lat, lng } = e.latlng;
    const url = `https://ensemble-api.open-meteo.com/v1/ensemble?latitude=${lat}&longitude=${lng}&hourly=temperature_2m&models=ecmwf_ifs025_ensemble`;

    try {
            const response = await fetch(url);
            const data = await response.json();

                // 3. Process the dynamic "member" keys
            const timeLabels = data.hourly.time.map(t => t.replace('T', ' '));
            const memberKeys = Object.keys(data.hourly).filter(key => key.includes('member'));

                // Build datasets for the chart
            const datasets = memberKeys.map((key, index) => {
                const isFirst = index === 0;
                return {
                    label: isFirst ? 'Ensemble Members' : '', // Label only once
                    data: data.hourly[key],
                    borderColor: isFirst ? 'rgba(255, 99, 132, 0.8)' : 'rgba(54, 162, 235, 0.1)',
                    borderWidth: isFirst ? 2 : 1,
                    pointRadius: 0,
                    fill: false
                };
            });

                // 4. Create Popup Content
            const popupDiv = document.createElement('div');
            popupDiv.className = 'chart-container';
            popupDiv.innerHTML = `<canvas id="ECMWF ensembleChart"></canvas>`;

            L.popup()
                .setLatLng(e.latlng)
                .setContent(popupDiv)
                .openOn(map);

                // 5. Initialize Chart.js
            const ctx = document.getElementById('ensembleChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: timeLabels,
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { intersect: false, mode: 'index' },
                    plugins: {
                        legend: { display: false },
                        title: { display: true, text: `Temp Ensemble (${lat.toFixed(2)}, ${lng.toFixed(2)})` }
                    },
                    scales: {
                        x: { ticks: { maxTicksLimit: 6 } },
                        y: { title: { display: true, text: '°C' } }
                    }
                }
            });

        } catch (err) {
            console.error("Error fetching weather data:", err);
            L.popup().setLatLng(e.latlng).setContent("Failed to load data").openOn(map);
        }
    });

function wrapPosition(position) {
    while (position >= mapFrames.length) {
        position -= mapFrames.length;
    }
    while (position < 0) {
        position += mapFrames.length;
    }
    return position;
}

function formatTime(timestamp) {
    return new Date(timestamp * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function createRadarLayer(frame) {
    return new L.TileLayer(apiData.host + frame.path + '/' + TILE_SIZE + '/{z}/{x}/{y}/2/1_1.png', {
        tileSize: 256,
        opacity: 0.001,
        maxNativeZoom: 7,
        maxZoom: 16
    });
}

function clearLayerCache() {
    stop();
    for (var pos in layerCache) {
        if (parseInt(pos) !== animationPosition) {
            map.removeLayer(layerCache[pos]);
            delete layerCache[pos];
        }
    }
}

function stop() {
    if (animationTimer) {
        clearTimeout(animationTimer);
        animationTimer = false;
        document.getElementById("playBtn").innerHTML = "▶";
        return true;
    }
    return false;
}

function play() {
    animationTimer = true;
    document.getElementById("playBtn").innerHTML = "⏸";
    showFrame(animationPosition + 1);
}

function playStop() {
    if (!stop()) {
        play();
    }
}

function updateTimestamp(frame) {
    document.getElementById("timestamp").innerHTML = formatTime(frame.time);
}

function showFrame(position) {
    if (isLoading) return;

    position = wrapPosition(position);
    var frame = mapFrames[position];

    updateTimestamp(frame);

    var oldLayer = currentLayer;

    if (layerCache[position]) {
        if (oldLayer) {
            oldLayer.setOpacity(0);
        }
        layerCache[position].setOpacity(RADAR_OPACITY);
        currentLayer = layerCache[position];
        animationPosition = position;

        if (animationTimer) {
            animationTimer = setTimeout(play, ANIMATION_DELAY_MS);
        }
        return;
    }

    isLoading = true;

    var newLayer = createRadarLayer(frame);

    newLayer.on('load', function() {
        newLayer.setOpacity(RADAR_OPACITY);
        if (oldLayer) {
            oldLayer.setOpacity(0);
        }
        layerCache[position] = newLayer;
        currentLayer = newLayer;
        animationPosition = position;
        isLoading = false;

        if (animationTimer) {
            animationTimer = setTimeout(play, ANIMATION_DELAY_MS);
        }
    });

    newLayer.addTo(map);
}

function initialize(api) {
    clearLayerCache();
    currentLayer = null;
    mapFrames = [];
    animationPosition = 0;

    if (!api || !api.radar || !api.radar.past) {
        return;
    }

    mapFrames = api.radar.past;
    showFrame(mapFrames.length - 1);
}

function loadApiData() {
    var apiRequest = new XMLHttpRequest();
    apiRequest.open("GET", API_URL, true);
    apiRequest.onload = function() {
        apiData = JSON.parse(apiRequest.response);
        initialize(apiData);
    };
    apiRequest.send();
}

map.on('movestart', clearLayerCache);
loadApiData();
</script>

</body>
</html>
