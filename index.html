<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Storm Map - Track & Pop-ups</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v10.8.0/ol.css">
    <script src="https://cdn.jsdelivr.net/npm/ol@v10.8.0/dist/ol.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #0b1621; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        const map = new ol.Map({
            target: 'map',
            layers: [new ol.layer.Tile({ source: new ol.source.OSM() })],
            view: new ol.view.View({
                center: ol.proj.fromLonLat([114.1745, 22.3025]),
                zoom: 5,
                maxZoom: 15
            })
        });

        // 強化版 Fetch
        fetch('https://api.rainviewer.com/public/weather-maps.json')
            .then(res => res.json())
            .then(data => {
                const latest = data.radar.past.pop();
                const radarUrl = `${data.host}${latest.path}/1024/{z}/{x}/{y}/2/1_1.png`;
                
                if (window.radarLayer) map.removeLayer(window.radarLayer);
                
                window.radarLayer = L.tileLayer(radarUrl, { 
                    opacity: 0.5,
                    maxZoom: 15,
                    maxNativeZoom: 7,
                    zIndex: 100 
                }).addTo(map);
            })
            .catch(err => console.error("Radar failed:", err));
    </script>
</body>
</html>
