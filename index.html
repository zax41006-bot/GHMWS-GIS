<!DOCTYPE html>
<html>

  <head>
    <meta charset="utf-8" />
    <title>OpenLayers Sample using Imagery Map API</title>
    <script src="https://cdn.jsdelivr.net/npm/ol@v10.2.1/dist/ol.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v10.2.1/ol.css">
    <style>
    html,
    body,
    #map {
      padding: 0 0;
      margin: 0 0;
      width: 100%;
      height: 100%;
    }

    .ol-attribution.ol-uncollapsible {
      height: auto;
      background: transparent
    }

    .text-align {
      color: #333;
      font-size: 12px;
      font-family: sans-serif;
      text-align: right;
    }

    .ol-attribution ul {
      font-size: 12px;
      font-family: sans-serif;
    }

    .ol-attribution.ol-uncollapsible img {
      max-height: 25px;
    }

    .ol-attribution a {
      color: black;
    }
    </style>
  </head>

  <body>
    <div id="map" class="map"></div>
    <script>var imageryAPI = 'https://mapapi.geodata.gov.hk/gs/api/v1.0.0/xyz/imagery/wgs84/{z}/{x}/{y}.png';
var attributionInfo = 'Image ©2002 NASA/USGS|Image ©2016 NASA/USGS|Contains modified Copernicus Sentinel data [2022]|<a href="https://api.portal.hkmapservice.gov.hk/disclaimer" target="_blank" class="copyrightDiv">&copy;Map information from Lands Department</a><img src="https://api.hkmapservice.gov.hk/mapapi/landsdlogo.jpg"></img>';
var map = new ol.Map({
    controls: ol.control.defaults.defaults({
        attribution: false
    }).extend([new ol.control.Attribution({
        collapsible: false
    })]),
    layers: [
        new ol.layer.Tile({
            source: new ol.source.XYZ({
                url: imageryAPI,
                attributions: attributionInfo
            })
        }),
    ],
    target: 'map',
    logo: false,
    view: new ol.View({
        center: ol.proj.fromLonLat([114.20847, 22.29227]),
        zoom: 5,
        minZoom: 0,
        maxZoom: 7
    })
});
function getStormColor(winds) {
    if (winds >= 140) return 'indigo';
    if (winds >= 100) return 'purple';
    if (winds >= 84) return 'pink';
    if (winds >= 64) return 'red';
    if (winds >= 47) return 'blue';
    if (winds >= 34) return 'green';
    if (winds >= 22) return 'grey';
    return 'white';
}
fetch("https://api.knackwx.com/atcf/v2")
    .then(response => response.json())
    .then(data => {
        data.forEach(storm => {
            // 1. Create a Vector Layer for this storm's details (tracks, etc.)
            const stormLayer = new ol.layer.Vector({
                source: new ol.source.Vector(),
                visible: true 
            });
            map.addLayer(stormLayer);

            // 2. Create the HTML for the Toggle Label
            const element = document.createElement('div');
            element.className = 'storm-overlay';
            element.innerHTML = `
                <div style="text-align: center;">
                    <div style="width: 12px; height: 12px; background: ${getStormColor(storm.winds)}; border-radius: 50%; border: 1.5px solid black; margin: 0 auto;"></div>
                    <div style="background: rgba(255,255,255,0.8); padding: 2px 5px; border-radius: 3px; font-size: 11px; margin-top: 2px;">
                        <input type="checkbox" id="chk-${storm.atcf_id}" checked>
                        <label for="chk-${storm.atcf_id}">${storm.storm_name}</label>
                    </div>
                </div>
            `;

            // 3. Create the Overlay and add to map
            const overlay = new ol.Overlay({
                position: ol.proj.fromLonLat([parseFloat(storm.longitude), parseFloat(storm.latitude)]),
                positioning: 'bottom-center',
                element: element,
                stopEvent: true // Important: allows clicking the checkbox without clicking the map
            });
            map.addOverlay(overlay);

            // 4. Link Checkbox to Layer Visibility
            const checkbox = element.querySelector('input');
            checkbox.addEventListener('change', (e) => {
                stormLayer.setVisible(e.target.checked);
            });
        });
    });
// 4. Fetch Radar (Run once, not inside the storm loop)
fetch('https://api.rainviewer.com/public/weather-maps.json')
    .then(response => response.json())
    .then(data => {
        const latestFrame = data.radar.past[data.radar.past.length - 1];
        const radarLayer = new ol.layer.Tile({
            source: new ol.source.XYZ({
                url: data.host + latestFrame.path + '/1024/{z}/{x}/{y}/7/1_0.png'
            }),
            opacity: 0.6
        });
        map.addLayer(radarLayer);
    });</script>
  </body>
  
</html>
