<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Storm Map - Track & Pop-ups</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v10.8.0/ol.css">
    <script src="https://cdn.jsdelivr.net/npm/ol@v10.8.0/dist/ol.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #0b1621; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        // 1. 先初始化地圖 (這是你原本漏掉的最重要步驟)
        const map = new ol.Map({
    target: 'map',
    layers: [
        new ol.layer.Tile({ source: new ol.source.OSM() })
    ],
    view: new ol.view.View({
        center: ol.proj.fromLonLat([114.1745, 22.3025]),
        zoom: 5,
        maxZoom: 15 // 地圖允許縮放到 15
    })
});

// 2. 獲取雷達數據
fetch('https://rainviewer.com')
    .then(response => response.json())
    .then(data => {
        const latestFrame = data.radar.past[data.radar.past.length - 1];
        
        const radarLayer = new ol.layer.Tile({
            source: new ol.source.XYZ({
                url: data.host + latestFrame.path + '/512/{z}/{x}/{y}/2/1_1.png',
                // 關鍵設定：告訴 OpenLayers 雷達圖片最高只到第 7 級
                // 超過 7 級時，它會自動放大（Upscale）現有的圖片，不會報 404 錯誤
                maxZoom: 7 
            }),
            opacity: 0.6
        });

        map.addLayer(radarLayer);
    });
    </script>
</body>
</html>
