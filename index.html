<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Storm Map - Track & Pop-ups</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v10.8.0/ol.css">
    <script src="https://cdn.jsdelivr.net/npm/ol@v10.8.0/dist/ol.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #0b1621; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        
        /* Pop-up Styling */
    </style>
</head>
<body>
    <div id="map"></div>

    <!-- Pop-up HTML Structure -->
    <script>
        const lonLat = [114.1745, 22.3025];
        步驟)
        const map = new ol.Map({
            target: 'map',
            layers: [
                new ol.layer.Tile({
                    source: new ol.source.OSM() // 基礎底圖
                })
            ],
            view: new ol.view.View({
                center: ol.proj.fromLonLat([114.1745, 22.3025]), // 香港座標
                zoom: 5
            })
        });
        // Added 'time' property to your data
	fetch('https://api.rainviewer.com/public/weather-maps.json')
	   .then(response => response.json())
	   .then(data => {
	       const latestFrame = data.radar.past[data.radar.past.length - 1];
	       const radarLayer = new ol.layer.Tile({
	           source: new ol.source.XYZ({
	               url: data.host + latestFrame.path + '/1024/{z}/{x}/{y}/7/1_0.png'
	           }),
	           opacity: 0.6,
			   maxNativeZoom:7,
		       maxZoom:15
	       });
	       map.addLayer(radarLayer);
	   })
	   .catch(err => console.error("Radar failed to load:", err));
    </script>
</body>
</html>
