<!DOCTYPE html>
<html>

  <head>
    <meta charset="utf-8" />
    <title>OpenLayers Sample using Imagery Map API</title>
    <script src="https://cdn.jsdelivr.net/npm/ol@v10.2.1/dist/ol.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v10.2.1/ol.css">
    <style>
    html,
    body,
    #map {
      padding: 0 0;
      margin: 0 0;
      width: 100%;
      height: 100%;
    }

    .ol-attribution.ol-uncollapsible {
      height: auto;
      background: transparent
    }

    .text-align {
      color: #333;
      font-size: 12px;
      font-family: sans-serif;
      text-align: right;
    }

    .ol-attribution ul {
      font-size: 12px;
      font-family: sans-serif;
    }

    .ol-attribution.ol-uncollapsible img {
      max-height: 25px;
    }

    .ol-attribution a {
      color: black;
    }
    </style>
  </head>

  <body>
    <div id="map" class="map"></div>
    <script>map.js</script>
  </body>
  
</html>
